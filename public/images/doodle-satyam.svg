  <path d="M250 182 Q262 190 275 182" stroke="#1A1A1A" stroke-width="1.2" stroke-linecap="round" fill="none"/>

  <!-- ═══ EARS ═══ -->
  <path d="M222 148 Q215 150 214 158 Q215 166 222 168" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>
  <path d="M298 146 Q305 148 306 156 Q305 164 298 166" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>

  <!-- ═══ NECK ═══ -->
  <path d="M248 194 L245 215" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M272 193 L275 215" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round"/>

  <!-- ═══ POLO SHIRT ═══ -->
