  <!-- Thumb on strap -->
  <path d="M195 358 Q200 355 202 358" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>

  <!-- ═══ RIGHT ARM (hanging relaxed) ═══ -->
  <path d="M328 288 Q335 315 333 345 Q332 370 328 390"
    stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round"/>
