  <!-- Sleeve hem -->
  <path d="M328 288 Q322 291 312 288" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>

  <!-- Torso left side -->
  <path d="M208 285 Q205 320 208 355 Q210 375 215 395"
