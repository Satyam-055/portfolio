  <path d="M330 395 Q332 400 330 403" stroke="#1A1A1A" stroke-width="1.2" stroke-linecap="round"/>

  <!-- ═══ WATCH (left wrist) ═══ -->
  <rect x="179" y="348" width="10" height="14" rx="3" stroke="#1A1A1A" stroke-width="1.8" fill="none"/>
  <line x1="184" y1="348" x2="184" y2="344" stroke="#1A1A1A" stroke-width="1.5"/>
  <line x1="184" y1="362" x2="184" y2="366" stroke="#1A1A1A" stroke-width="1.5"/>

  <!-- ═══ JEANS (solid black fill — key style element) ═══ -->
  <!-- Left leg -->
  <path d="M215 395 Q212 430 210 470 Q208 510 207 545 Q206 565 205 580
           L225 582 Q224 565 224 545 Q225 510 228 470 Q230 440 235 410 Q240 400 245 398"
