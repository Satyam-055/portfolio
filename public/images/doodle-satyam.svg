  <!-- Shoe detail lines -->
  <path d="M200 592 Q212 590 225 592" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <path d="M292 592 Q304 590 316 592" stroke="white" stroke-width="0.8" opacity="0.3"/>

  <!-- ═══ GROUND SHADOW (subtle) ═══ -->
  <ellipse cx="260" cy="602" rx="80" ry="6" fill="#1A1A1A" opacity="0.06"/>

</svg>
