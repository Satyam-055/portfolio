  <path d="M192 285 Q198 288 208 285" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>

  <!-- Right shoulder + sleeve -->
  <path d="M282 218 Q305 225 320 238 Q330 248 332 262 Q334 275 328 288"
