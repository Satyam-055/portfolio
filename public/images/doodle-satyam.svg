<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 680" fill="none">
  <!--
    Doodle portrait of Satyam at Lodhi Gardens
    Style: Contemporary line illustration — confident strokes, solid fills,
    closed shapes, minimal face, black hair fill, casual standing pose
  -->

  <!-- ═══ HAIR (solid black, messy top) ═══ -->
  <path d="M230 128 Q225 110 235 100 Q245 90 260 88 Q275 87 285 92 Q295 98 298 110 Q300 118 295 125"
    fill="#1A1A1A" stroke="#1A1A1A" stroke-width="2"/>
