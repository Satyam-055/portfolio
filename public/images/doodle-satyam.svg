  <!-- Crotch connection -->
  <path d="M245 398 Q260 415 275 398" stroke="#1A1A1A" stroke-width="2" fill="#1A1A1A"/>

  <!-- Jean wrinkle highlights (white lines on dark) -->
  <path d="M218 450 Q222 455 220 460 M215 500 Q220 505 218 510 M290 455 Q294 460 292 465 M295 510 Q300 515 298 520"
